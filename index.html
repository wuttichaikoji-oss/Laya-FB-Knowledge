<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laya F&B Academy v3.1 English Master</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero-text">
        <div class="eyebrow">Laya F&B Academy</div>
        <h1>v3.1 English Master</h1>
        <p>รวมคำศัพท์สาย F&amp;B แบบอ่านง่าย เห็นเยอะ ค้นหาเร็ว และกดฟังเสียงได้ทันที</p>
      </div>
      <div class="hero-stats">
        <div class="stat-card">
          <span>รวมคำศัพท์</span>
          <strong id="totalWords">0</strong>
        </div>
        <div class="stat-card">
          <span>รายการโปรด</span>
          <strong id="favCount">0</strong>
        </div>
      </div>
    </header>

    <section class="toolbar">
      <div class="search-wrap">
        <input id="searchInput" type="search" placeholder="ค้นหาคำศัพท์ เช่น menu, broccoli, welcome, order" />
      </div>
      <div class="top-actions">
        <button id="showFavoritesBtn" class="secondary-btn">ดูเฉพาะรายการโปรด</button>
        <button id="showAllBtn" class="secondary-btn hidden">กลับไปดูทั้งหมด</button>
      </div>
    </section>

    <nav id="categoryTabs" class="tabs"></nav>

    <section class="section-head">
      <div>
        <h2 id="sectionTitle">English: F&B</h2>
        <p id="sectionSub">เลือกหมวดที่ต้องการอ่าน</p>
      </div>
      <div class="count-pill" id="sectionCount">0 รายการ</div>
    </section>

    <main id="listView" class="list-view"></main>
  </div>

  <template id="rowTemplate">
    <article class="vocab-row">
      <button class="star-btn" title="บันทึกเป็นรายการโปรด">☆</button>
      <div class="term-block">
        <div class="term-line">
          <span class="term"></span>
        </div>
        <div class="reading"></div>
        <div class="meaning"></div>
      </div>
      <button class="speak-btn" title="ฟังเสียง">🔊</button>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
